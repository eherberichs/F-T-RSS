name: Update EU Calls RSS Feed

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

# Prevent concurrent runs from conflicting
concurrency:
  group: rss-feed
  cancel-in-progress: true

# Required to push changes
permissions:
  contents: write

# Future-proof GitHub Actions runtime
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run script
        run: python script.py

     name: Update EU Calls RSS Feed

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

# Prevent concurrent runs from conflicting
concurrency:
  group: rss-feed
  cancel-in-progress: true

# Required to push changes
permissions:
  contents: write

# Future-proof GitHub Actions runtime
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run script
        run: python script.py

      - name: Commit and push RSS
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add eu_calls_feed.xml eu_calls_snapshot.csv
          git commit -m "Update RSS feed" || echo "No changes"

          # 🔑 Pull latest changes to avoid conflicts
          git pull --rebase origin main || echo "Nothing to rebase"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
